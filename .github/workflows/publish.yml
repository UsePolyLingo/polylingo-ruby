name: Publish gem

# Tag push should trigger a run; workflow_dispatch lets you publish from Actions UI
# if tag events are blocked or missed. release: published covers "Publish release" flow.
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build and push
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p dist
          gem build polylingo.gemspec -o dist/polylingo.gem
          gem push dist/polylingo.gem
